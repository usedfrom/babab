<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Sprint: Among Us</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(20,20,40,0.9) 0%, rgba(0,0,0,1) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
            color: white;
            text-align: center;
            border: 5px solid #ff4757;
            box-sizing: border-box;
        }

        h1 {
            font-size: 50px;
            margin: 0 0 10px 0;
            color: #ff4757;
            text-transform: uppercase;
            text-shadow: 0 0 20px #ff4757;
            letter-spacing: 3px;
            font-style: italic;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            max-width: 80%;
            line-height: 1.6;
            color: #a4b0be;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #57606f;
        }

        .highlight {
            color: #ffa502;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 0 10px #ffa502;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        button {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            border: none;
            padding: 20px 60px;
            color: white;
            font-size: 24px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            min-width: 350px;
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(45deg);
            transition: 0.5s;
            opacity: 0;
        }

        button:hover::after {
            opacity: 1;
            left: 100%;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.8);
        }

        .mode-2 {
            background: linear-gradient(45deg, #00d2d3, #00a8a8);
            box-shadow: 0 0 20px rgba(0, 210, 211, 0.6);
        }

        .mode-2:active {
            box-shadow: 0 0 10px rgba(0, 210, 211, 0.8);
        }

        #score-display {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 50px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 10px #000;
            z-index: 5;
            font-family: 'Courier New', monospace;
        }

        #distance-display {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #00d2d3;
            text-shadow: 0 0 10px #00d2d3;
            z-index: 5;
            font-family: 'Courier New', monospace;
            border: 2px solid #00d2d3;
            padding: 5px 15px;
            border-radius: 5px;
            background: rgba(0,0,0,0.5);
        }
        
        #mic-status {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 5;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mic-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #555;
            transition: background 0.1s;
        }

        .power-bar-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            z-index: 5;
        }

        .power-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ed573, #ffa502, #ff4757);
            transition: width 0.1s;
        }

        .power-text {
            position: absolute;
            bottom: 105px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
            z-index: 5;
        }

        .mode-indicator {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffa502;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #ffa502;
            z-index: 5;
            background: rgba(0,0,0,0.5);
            padding: 5px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="score-display">0000</div>
        <div id="distance-display">0м</div>
        <div class="mode-indicator" id="mode-indicator">Механика: ПРЫЖКИ</div>
        <div class="power-text">СИЛА КРИКА</div>
        <div class="power-bar-container">
            <div class="power-bar" id="power-bar"></div>
        </div>
        <div id="mic-status">
            <div class="mic-dot" id="mic-dot"></div>
            <span id="mic-text">Ожидание...</span>
        </div>
    </div>

    <div id="start-screen">
        <h1>Voice Sprint</h1>
        <p>
            Выберите режим игры:<br><br>
            <span class="highlight">МЕХАНИКА 1</span> - Прыжки вверх<br>
            Крик = высокий прыжок вверх<br><br>
            <span class="highlight">МЕХАНИКА 2</span> - Полёт с ускорением<br>
            Крик = полёт вперёд и вверх<br>
            Скорость набирается со временем!
        </p>
        <div class="button-container">
            <button id="start-btn-1">🚀 ЗАПУСК (ПРЫЖКИ)</button>
            <button id="start-btn-2" class="mode-2">✈️ ЗАПУСК (ПОЛЁТ)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const distanceEl = document.getElementById('distance-display');
        const startScreen = document.getElementById('start-screen');
        const startBtn1 = document.getElementById('start-btn-1');
        const startBtn2 = document.getElementById('start-btn-2');
        const micDot = document.getElementById('mic-dot');
        const micText = document.getElementById('mic-text');
        const powerBar = document.getElementById('power-bar');
        const modeIndicator = document.getElementById('mode-indicator');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let frames = 0;
        let cameraX = 0;
        let groundY = 0;
        let gameMode = 1; // 1 = прыжки, 2 = полёт
        
        const player = {
            x: 100,
            y: 0,
            w: 70,
            h: 90,
            vx: 0,
            vy: 0,
            isGrounded: true,
            legFrame: 0,
            tilt: 0,
            squash: 1,
            stretch: 1
        };

        let platforms = [];
        let obstacles = [];
        let particles = []; 
        let stars = [];
        let fireParticles = [];

        // === ФИЗИКА ДЛЯ МЕХАНИКИ 1 (ПРЫЖКИ) ===
        const JUMP_GRAVITY = 0.6;
        const JUMP_LIFT_POWER = 1.3;
        const JUMP_FORWARD_POWER = 0.25;
        const JUMP_FRICTION = 0.97;
        const JUMP_MAX_SPEED_X = 12;
        const JUMP_MAX_SPEED_Y = 16;

        // === ФИЗИКА ДЛЯ МЕХАНИКИ 2 (ПОЛЁТ) ===
        const FLIGHT_GRAVITY = 0.5;
        const FLIGHT_LIFT_POWER = 0.9;
        const FLIGHT_FORWARD_POWER = 0.4;
        const FLIGHT_FRICTION = 0.98;
        const FLIGHT_MAX_SPEED_X = 18;
        const FLIGHT_MAX_SPEED_Y = 15;
        const FLIGHT_ACCELERATION = 0.002; // Ускорение со временем

        // Аудио
        let audioContext, analyser, microphone, dataArray;
        let currentVolume = 0;
        let smoothVolume = 0;
        const MIN_VOLUME = 0,5;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            groundY = height - 150;
            initStars();
        }
        window.addEventListener('resize', resize);
        resize();

        function initStars() {
            stars = [];
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * width * 2,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512;
                microphone.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                micText.innerText = "МИКРОФОН АКТИВЕН";
                micText.style.color = "#2ed573";
                return true;
            } catch (err) {
                micText.innerText = "НЕТ МИКРОФОНА";
                micText.style.color = "#ff4757";
                return false;
            }
        }

        function getVolume() {
            if (!analyser) return 0;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            return sum / dataArray.length;
        }

        function resetGame(mode) {
            gameMode = mode;
            
            player.x = 100;
            player.y = groundY - player.h;
            player.vx = 0;
            player.vy = 0;
            player.isGrounded = true;
            player.squash = 1;
            player.stretch = 1;
            player.tilt = 0;
            
            platforms = [];
            obstacles = [];
            particles = [];
            fireParticles = [];
            cameraX = 0;
            
            // Стартовая платформа
            platforms.push({ x: -500, y: groundY, w: 1000, h: 200 });
            
            score = 0;
            scoreEl.innerText = "0000";
            frames = 0;
            gameRunning = true;
            
            // Обновляем индикатор режима
            if (mode === 1) {
                modeIndicator.innerText = "МЕХАНИКА: ПРЫЖКИ";
                modeIndicator.style.color = "#ff4757";
            } else {
                modeIndicator.innerText = "МЕХАНИКА: ПОЛЁТ С УСКОРЕНИЕМ";
                modeIndicator.style.color = "#00d2d3";
            }
            
            // Генерируем платформы
            let platformX = 500;
            for(let i=0; i<15; i++) {
                generatePlatform(platformX);
                const lastP = platforms[platforms.length - 1];
                platformX = lastP.x + lastP.w + Math.random() * 150 + 80;
            }
            
            loop();
        }

        function generatePlatform(xPos) {
            const w = Math.random() * 250 + 200;
            
            platforms.push({
                x: xPos,
                y: groundY,
                w: w,
                h: 200
            });

            if (Math.random() > 0.5) {
                createObstacle(xPos + w + 80);
            }
        }

        function createObstacle(xPos) {
            const type = Math.random() > 0.5 ? 'top' : 'bottom';
            const w = 80; 
            const baseH = Math.random() * 100 + 100;
            const isMoving = Math.random() > 0.6;
            
            let y;
            if (type === 'top') {
                y = 0; 
            } else {
                y = groundY - baseH; 
            }

            obstacles.push({
                x: xPos,
                y: y,
                w: w,
                h: baseH,
                targetH: isMoving ? baseH + Math.random() * 150 + 100 : baseH,
                currentH: isMoving ? 0 : baseH,
                type: type,
                isMoving: isMoving,
                extendPhase: 0,
                warningShown: false
            });
        }

        function createFire(x, y) {
            particles.push({
                x: x,
                y: y + Math.random() * 30,
                vx: -Math.random() * 5 - 2,
                vy: (Math.random() - 0.5) * 3,
                life: 1.0,
                size: Math.random() * 10 + 5,
                color: `hsl(${Math.random()*40 + 10}, 100%, 50%)`
            });
        }

        function createObstacleFire(x, y, w, h) {
            for(let i=0; i<2; i++) {
                fireParticles.push({
                    x: x + Math.random() * w,
                    y: y + (Math.random() > 0.5 ? 0 : h),
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() > 0.5 ? -3 : 3,
                    life: 1.0,
                    size: Math.random() * 8 + 3,
                    color: `hsl(${Math.random()*30 + 10}, 100%, 50%)`
                });
            }
        }

        function update() {
            if (!gameRunning) return;
            frames++;

            const vol = getVolume();
            smoothVolume = smoothVolume * 0.8 + vol * 0.2;
            currentVolume = smoothVolume;
            
            const isScreaming = smoothVolume > MIN_VOLUME;

            // UI
            const powerPercent = Math.min((smoothVolume / 50) * 100, 100);
            powerBar.style.width = powerPercent + '%';
            
            if (isScreaming) {
                micDot.style.background = '#2ed573';
                micDot.style.boxShadow = '0 0 10px #2ed573';
                micDot.style.transform = `scale(${1 + smoothVolume/30})`;
            } else {
                micDot.style.background = '#555';
                micDot.style.boxShadow = 'none';
                micDot.style.transform = 'scale(1)';
            }

            // === ПРИМЕНЯЕМ ФИЗИКУ В ЗАВИСИМОСТИ ОТ РЕЖИМА ===
            let GRAVITY, LIFT_POWER, FORWARD_POWER, FRICTION, MAX_SPEED_X, MAX_SPEED_Y;
            
            if (gameMode === 1) {
                // МЕХАНИКА 1: ПРЫЖКИ
                GRAVITY = JUMP_GRAVITY;
                LIFT_POWER = JUMP_LIFT_POWER;
                FORWARD_POWER = JUMP_FORWARD_POWER;
                FRICTION = JUMP_FRICTION;
                MAX_SPEED_X = JUMP_MAX_SPEED_X;
                MAX_SPEED_Y = JUMP_MAX_SPEED_Y;
            } else {
                // МЕХАНИКА 2: ПОЛЁТ С УСКОРЕНИЕМ
                GRAVITY = FLIGHT_GRAVITY;
                LIFT_POWER = FLIGHT_LIFT_POWER;
                FORWARD_POWER = FLIGHT_FORWARD_POWER;
                FRICTION = FLIGHT_FRICTION;
                MAX_SPEED_X = FLIGHT_MAX_SPEED_X + (frames * FLIGHT_ACCELERATION);
                MAX_SPEED_Y = FLIGHT_MAX_SPEED_Y;
            }

            // Физика полёта/прыжка
            if (isScreaming) {
                const normalizedVolume = Math.min(smoothVolume / 50, 1);
                
                player.vy -= LIFT_POWER * normalizedVolume;
                player.vx += FORWARD_POWER * normalizedVolume;
                
                player.isGrounded = false;
                player.tilt = -0.2;
                player.stretch = 1.05;
                player.squash = 0.95;
                
                if (frames % 2 === 0) {
                    createFire(player.x, player.y + player.h * 0.7);
                }
            } else {
                player.tilt = 0.05;
                player.stretch = 1;
                player.squash = 1;
            }

            player.vy += GRAVITY;
            player.vx *= FRICTION;

            if (player.vy > MAX_SPEED_Y) player.vy = MAX_SPEED_Y;
            if (player.vy < -MAX_SPEED_Y) player.vy = -MAX_SPEED_Y;
            if (player.vx > MAX_SPEED_X) player.vx = MAX_SPEED_X;
            if (player.vx < 0) player.vx = 0;

            player.x += player.vx;
            player.y += player.vy;

            // Камера
            const targetCameraX = player.x - width * 0.3;
            cameraX += (targetCameraX - cameraX) * 0.1;

            // Потолок
            if (player.y < 0) {
                player.y = 0;
                player.vy = 0;
                player.tilt = 0.2;
            }

            // Коллизия
            player.isGrounded = false;
            
            for (let p of platforms) {
                const playerLeft = player.x + player.w * 0.25;
                const playerRight = player.x + player.w * 0.75;
                const playerBottom = player.y + player.h;
                
                if (playerRight > p.x && playerLeft < p.x + p.w) {
                    if (playerBottom >= p.y - 10 && playerBottom <= p.y + 25) {
                        if (player.vy >= 0) {
                            player.y = p.y - player.h;
                            player.vy = 0;
                            player.isGrounded = true;
                            player.tilt = 0;
                            
                            if (player.squash > 0.95) {
                                player.squash = 0.8;
                                player.stretch = 1.2;
                            }
                            break;
                        }
                    }
                }
            }

            // Смерть
            if (player.y > height + 100) {
                gameOver();
                return;
            }

            // Звезды
            stars.forEach(star => {
                star.x -= player.vx * 0.3;
                if (star.x < cameraX - 100) star.x = cameraX + width + 100;
            });

            // Генерация платформ
            const lastPlatform = platforms[platforms.length - 1];
            if (lastPlatform.x + lastPlatform.w < cameraX + width + 500) {
                const newX = lastPlatform.x + lastPlatform.w + Math.random() * 150 + 80;
                generatePlatform(newX);
            }

            // Удаление
            if (platforms[0].x + platforms[0].w < cameraX - 400) {
                platforms.shift();
                score++;
                scoreEl.innerText = score.toString().padStart(4, '0');
            }

            // Препятствия
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];

                if (obs.isMoving) {
                    const distanceToPlayer = (player.x + player.w) - obs.x;
                    
                    if (distanceToPlayer < 400 && distanceToPlayer > 0 && obs.extendPhase < 2) {
                        if (obs.extendPhase === 0) obs.extendPhase = 1;
                        
                        if (obs.extendPhase === 1) {
                            obs.currentH += 8;
                            if (obs.currentH >= obs.targetH) {
                                obs.currentH = obs.targetH;
                                obs.extendPhase = 2;
                            }
                        }
                    }
                    
                    if (distanceToPlayer < -100 && obs.extendPhase === 2) {
                        obs.extendPhase = 3;
                    }
                    
                    if (obs.extendPhase === 3) {
                        obs.currentH -= 8;
                        if (obs.currentH <= obs.h) {
                            obs.currentH = obs.h;
                            obs.extendPhase = 2;
                        }
                    }
                } else {
                    obs.currentH = obs.h;
                }

                const padding = 12;
                const obsHeight = obs.currentH;
                const obsY = obs.type === 'top' ? obs.y : (groundY - obs.currentH);
                
                if (player.x + player.w - padding > obs.x && 
                    player.x + padding < obs.x + obs.w &&
                    player.y + player.h - padding > obsY &&
                    player.y + padding < obsY + obsHeight) {
                    gameOver();
                    return;
                }

                if (frames % 5 === 0) {
                    createObstacleFire(obs.x, obsY, obs.w, obsHeight);
                }

                if (obs.x + obs.w < cameraX - 200) {
                    obstacles.splice(i, 1);
                }
            }

            const distance = Math.floor(player.x / 10);
            distanceEl.innerText = distance + 'м';

            // Частицы
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                p.size *= 0.95;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            for (let i = fireParticles.length - 1; i >= 0; i--) {
                let p = fireParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                p.size *= 0.95;
                if (p.life <= 0) fireParticles.splice(i, 1);
            }
            
            player.squash += (1 - player.squash) * 0.1;
            player.stretch += (1 - player.stretch) * 0.1;
            
            if (!player.isGrounded) {
                player.tilt += (0.05 - player.tilt) * 0.05;
            }
        }

        function drawAmogus(x, y, w, h) {
            ctx.save();
            
            const centerX = x + w / 2;
            const bottomY = y + h;
            
            ctx.translate(centerX, bottomY);
            ctx.rotate(player.tilt);
            ctx.scale(player.stretch, player.squash);
            ctx.translate(-centerX, -bottomY);

            let legOffsetL = 0;
            let legOffsetR = 0;
            if (player.isGrounded && player.vx > 0.5) {
                player.legFrame += 0.4 + (player.vx/5);
                legOffsetL = Math.sin(player.legFrame) * 15;
                legOffsetR = Math.sin(player.legFrame + Math.PI) * 15;
            } else if (!player.isGrounded) {
                legOffsetL = -5;
                legOffsetR = 5;
            }

            const bodyColor = '#ff4757';
            const bodyDark = '#c0392b';
            const visorColor = '#74b9ff';
            const visorDark = '#0984e3';

            ctx.fillStyle = bodyDark;
            ctx.fillRect(x - 15, y + h * 0.35, 18, h * 0.35);
            ctx.fillStyle = bodyColor;
            ctx.fillRect(x - 12, y + h * 0.35, 12, h * 0.35);

            ctx.fillStyle = bodyColor;
            ctx.strokeStyle = bodyDark;
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.roundRect(x + 12 + legOffsetL, y + h - 25, 18, 25, 8);
            ctx.fill();
            ctx.stroke();
            
            ctx.beginPath();
            ctx.roundRect(x + w - 30 + legOffsetR, y + h - 25, 18, 25, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = bodyColor;
            ctx.strokeStyle = bodyDark;
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            ctx.moveTo(x + 15, y + h * 0.15);
            ctx.quadraticCurveTo(x + 15, y, x + 30, y);
            ctx.lineTo(x + w - 10, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + 20);
            ctx.lineTo(x + w, y + h * 0.85);
            ctx.quadraticCurveTo(x + w, y + h, x + w - 15, y + h);
            ctx.lineTo(x + 20, y + h);
            ctx.quadraticCurveTo(x + 15, y + h, x + 15, y + h * 0.85);
            ctx.lineTo(x + 15, y + h * 0.15);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.beginPath();
            ctx.moveTo(x + 25, y + h * 0.2);
            ctx.quadraticCurveTo(x + 25, y + h * 0.15, x + 40, y + h * 0.15);
            ctx.lineTo(x + 40, y + h * 0.2);
            ctx.quadraticCurveTo(x + 25, y + h * 0.2, x + 25, y + h * 0.2);
            ctx.fill();

            ctx.fillStyle = visorColor;
            ctx.strokeStyle = visorDark;
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.ellipse(x + w - 18, y + h * 0.38, 20, 13, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.beginPath();
            ctx.ellipse(x + w - 14, y + h * 0.35, 8, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawObstacle(obs) {
            const obsY = obs.type === 'top' ? obs.y : (groundY - obs.currentH);
            
            ctx.shadowBlur = 20 + Math.sin(frames * 0.1) * 10;
            ctx.shadowColor = '#ff4757';
            
            const gradient = ctx.createLinearGradient(obs.x, obsY, obs.x + obs.w, obsY + obs.currentH);
            gradient.addColorStop(0, '#ff4757');
            gradient.addColorStop(0.3, '#ff6b81');
            gradient.addColorStop(0.6, '#ffa502');
            gradient.addColorStop(1, '#ff4757');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(obs.x, obsY, obs.w, obs.currentH);
            
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = 'rgba(255, 100, 50, 0.6)';
            ctx.fillRect(obs.x + 8, obsY + 8, obs.w - 16, obs.currentH - 16);
            
            ctx.fillStyle = 'rgba(255, 255, 200, 0.8)';
            ctx.fillRect(obs.x + 20, obsY + 20, obs.w - 40, obs.currentH - 40);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 3;
            const stripeOffset = (frames * 3) % 30;
            ctx.beginPath();
            for(let i = -30; i < obs.currentH + 30; i += 30) {
                ctx.moveTo(obs.x, obsY + i + stripeOffset);
                ctx.lineTo(obs.x + obs.w, obsY + i + 15 + stripeOffset);
            }
            ctx.stroke();
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(obs.x, obsY, obs.w, obs.currentH);
            
            if (obs.isMoving) {
                ctx.fillStyle = obs.extendPhase === 1 ? '#ffa502' : '#ff4757';
                ctx.beginPath();
                ctx.arc(obs.x + obs.w/2, obsY + (obs.type === 'top' ? obs.currentH - 10 : 10), 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(obs.x + obs.w/2, obsY + (obs.type === 'top' ? obs.currentH - 10 : 10), 12 + Math.sin(frames * 0.2) * 3, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function draw() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, "#0f0c29");
            gradient.addColorStop(0.5, "#302b63");
            gradient.addColorStop(1, "#24243e");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = 'white';
            stars.forEach(star => {
                const screenX = star.x - cameraX * 0.5;
                if (screenX > -50 && screenX < width + 50) {
                    ctx.globalAlpha = Math.random() * 0.5 + 0.3;
                    ctx.beginPath();
                    ctx.arc(screenX, star.y, star.size, 0, Math.PI*2);
                    ctx.fill();
                }
            });
            ctx.globalAlpha = 1.0;

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridOffset = (cameraX * 0.5) % 100;
            for(let i=0; i<width + 200; i+=100) {
                ctx.beginPath();
                ctx.moveTo(i - gridOffset, 0);
                ctx.lineTo(i - gridOffset, height);
                ctx.stroke();
            }

            ctx.save();
            ctx.translate(-cameraX, 0);

            for (let p of platforms) {
                if (p.x + p.w > cameraX - 100 && p.x < cameraX + width + 100) {
                    ctx.fillStyle = '#2f3542';
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    
                    ctx.fillStyle = '#00d2d3';
                    ctx.fillRect(p.x, p.y, p.w, 5);
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00d2d3';
                    ctx.fillRect(p.x, p.y, p.w, 2);
                    ctx.shadowBlur = 0;
                    
                    ctx.fillStyle = '#57606f';
                    ctx.fillRect(p.x + 20, p.y + 20, 10, 10);
                    ctx.fillRect(p.x + p.w - 40, p.y + 20, 10, 10);
                }
            }

            for (let obs of obstacles) {
                if (obs.x + obs.w > cameraX - 100 && obs.x < cameraX + width + 100) {
                    drawObstacle(obs);
                }
            }

            for (let p of particles) {
                const screenX = p.x - cameraX;
                if (screenX > -50 && screenX < width + 50) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(screenX, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;
            
            for (let p of fireParticles) {
                const screenX = p.x - cameraX;
                if (screenX > -50 && screenX < width + 50) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(screenX, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;

            drawAmogus(player.x, player.y, player.w, player.h);

            ctx.restore();
        }

        function loop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function gameOver() {
            gameRunning = false;
            startScreen.style.display = 'flex';
            const distance = Math.floor(player.x / 10);
            document.querySelector('#start-screen h1').innerText = "ФИНИШ!";
            document.querySelector('#start-screen p').innerHTML = 
                `Дистанция: <span class="highlight">${distance}м</span><br>
                 Препятствий пройдено: ${score}<br>
                 Режим: ${gameMode === 1 ? 'ПРЫЖКИ' : 'ПОЛЁТ'}`;
            startBtn1.innerText = "🚀 ЕЩЁ РАЗ (ПРЫЖКИ)";
            startBtn2.innerText = "✈️ ЕЩЁ РАЗ (ПОЛЁТ)";
        }

        startBtn1.addEventListener('click', async () => {
            startScreen.style.display = 'none';
            const ok = await initAudio();
            if (ok) resetGame(1);
            else startScreen.style.display = 'flex';
        });

        startBtn2.addEventListener('click', async () => {
            startScreen.style.display = 'none';
            const ok = await initAudio();
            if (ok) resetGame(2);
            else startScreen.style.display = 'flex';
        });

    </script>
</body>
</html>
